name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 90
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # `npx playwright install` intermittently hangs on the macOS runner
          # right after the first browser downloads, eating the whole job
          # timeout. Run each attempt under a hard per-attempt timeout (perl
          # alarm — macOS has no GNU `timeout`) and retry. The result is cached,
          # so this only needs to succeed once per Playwright version.
          for i in 1 2 3 4; do
            echo "::group::Playwright install attempt $i"
            if perl -e 'alarm 900; exec @ARGV' npx playwright install; then
              echo "::endgroup::"
              echo "Playwright install succeeded on attempt $i"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $i failed or hung; retrying..."
            sleep 5
          done
          echo "Playwright install failed after all attempts"
          exit 1

      - name: Enforce catalog update (editor changes)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only FETCH_HEAD...HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^(components/editor/|app/editor/|lib/projects\.ts)'; then
            if ! echo "$CHANGED" | grep -Eq '^tests/catalog\.json$'; then
              echo "Editor changes detected but tests/catalog.json not updated."
              exit 1
            fi
          fi
      - name: Run Playwright tests
        env:
          E2E_TOKEN: inaa-e2e-token
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
