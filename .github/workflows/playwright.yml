name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 90
    # Linux runner on purpose: the macOS ARM runners stall for 15+ minutes
    # while extracting the downloaded browser bundle (macOS security scanning
    # of freshly written executables), which used to hang this job at the
    # "Install Playwright Browsers" step until the timeout — on every run,
    # since the cache only saves after a successful job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      - name: Resolve Playwright version
        id: pw
        run: echo "v=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.v }}

      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # On a cache hit only the browser binaries are restored; the apt
      # packages they need still have to be installed on the fresh runner.
      - name: Install Playwright system dependencies (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Enforce catalog update (editor changes)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only FETCH_HEAD...HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^(components/editor/|app/editor/|lib/projects\.ts)'; then
            if ! echo "$CHANGED" | grep -Eq '^tests/catalog\.json$'; then
              echo "Editor changes detected but tests/catalog.json not updated."
              exit 1
            fi
          fi
      - name: Run Playwright tests
        env:
          E2E_TOKEN: inaa-e2e-token
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
